services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "${CALENDARIO_PORT:-8080}:8000"
    environment:
      PORT: "8000"
      SQLITE_PATH: "/app/data/db.sqlite3"
    volumes:
      - calendario_data:/app/data
    restart: unless-stopped

volumes:
  calendario_data:
