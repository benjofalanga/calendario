{% extends 'timeoff/base.html' %}

{% block content %}
<section class="auth-card">
    <h1>Reset Password</h1>
    <p>Enter your account email and a reset link will be generated.</p>
    <form method="post" class="auth-form">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Send Reset Link</button>
    </form>
</section>
{% endblock %}
